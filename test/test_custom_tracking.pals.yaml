PALS:
  version: null
  notes:
    - "This file was generated by the `scibmad_to_pals()` function."
    - "Elements that have no `TrackingP` dictionary have `SciBmadStandard` as their tracking method."
  extension_names:
    names:
      - SciBmad
    prefixes:
      - SciBmad_
  facility:
    - drift_one:
        kind: Drift
        length: 0.25
        TrackingP:
          SciBmad:
            tracking_method: CustomTrackingMethod
            param1: ABC
            param2: 123
    - quad_one:
        kind: Quadrupole
        length: 1.0
        TrackingP:
          SciBmad:
            tracking_method: CustomTrackingMethod
            param1: ABC
            param2: 123
        MagneticMultipoleP:
          Bn1: 1.0
    - drift_two:
        kind: Drift
        length: 0.5
        TrackingP:
          SciBmad:
            tracking_method: CustomTrackingMethod
            param1: ABC
            param2: 123
    - quad_two:
        kind: Quadrupole
        length: 1.0
        TrackingP:
          SciBmad:
            tracking_method: CustomTrackingMethod
            param1: ABC
            param2: 123
        MagneticMultipoleP:
          Bn1: -1.0
    - beamline1:
        kind: Beamline
        line:
          - drift_one
          - quad_one
          - drift_two
          - quad_two
          - drift_one
    - lattice:
        kind: Lattice
        branches:
          - beamline1
    - use: lattice
