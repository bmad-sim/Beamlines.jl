PALS:
  version: null
  notes:
    - "This file was generated by the `scibmad_to_pals()` function."
  extension_names:
    names:
      - SciBmad
    prefixes:
      - SciBmad_
  facility:
    - drift1:
        kind: Drift
        length: 0.25
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
    - quad1:
        kind: Quadrupole
        length: 1.0
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
        MagneticMultipoleP:
          Bn1: 1.0
    - drift2:
        kind: Drift
        length: 0.5
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
    - quad2:
        kind: Quadrupole
        length: 1.0
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
        MagneticMultipoleP:
          Bn1: -1.0
    - beamline1:
        kind: Beamline
        line:
          - drift1
          - quad1
          - drift2
          - quad2
          - drift1
    - lattice:
        kind: Lattice
        branches:
          - beamline1
    - use: lattice
