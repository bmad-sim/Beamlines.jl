PALS:
  version: null
  notes:
    - "This file was generated by the `scibmad_to_pals()` function."
    - "Elements that have no `TrackingP` dictionary have `SciBmadStandard` as their tracking method."
  extension_names:
    names:
      - SciBmad
    prefixes:
      - SciBmad_
  facility:
    - patch_test:
        kind: Patch
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
            radiation_damping_on: false
            radiation_fluctuations_on: false
            ibs_damping_on: false
            ibs_fluctuations_on: false
        PatchP:
          SciBmad_dt: 1.0
          x_offset: 1.0
          y_offset: 1.0
          z_offset: 1.0
          x_rot: 1.0
          y_rot: 1.0
          z_rot: 1.0
    - beamline1:
        kind: Beamline
        line:
          - patch_test
    - lattice:
        kind: Lattice
        branches:
          - beamline1
    - use: lattice
