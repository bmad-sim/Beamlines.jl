PALS:
  version: null
  notes:
    - "This file was generated by the `scibmad_to_pals()` function."
    - "Elements that have no `TrackingP` dictionary have `SciBmadStandard` as their tracking method with all parameters equal to false"
  extension_names:
    names:
      - SciBmad
    prefixes:
      - SciBmad_
  facility:
    - drifta:
        kind: Drift
        length: 0.25
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
            radiation_damping_on: true
    - quada:
        kind: Quadrupole
        length: 1.0
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
            radiation_fluctuations_on: true
        MagneticMultipoleP:
          Bn1: 1.0
    - driftb:
        kind: Drift
        length: 0.5
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
            ibs_damping_on: true
    - quadb:
        kind: Quadrupole
        length: 1.0
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
            ibs_fluctuations_on: true
        MagneticMultipoleP:
          Bn1: -1.0
    - beamline1:
        kind: Beamline
        line:
          - drifta
          - quada
          - driftb
          - quadb
          - drifta
    - lattice:
        kind: Lattice
        branches:
          - beamline1
    - use: lattice
