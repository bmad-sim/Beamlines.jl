PALS:
  version: null
  notes:
    - "This file was generated by the `scibmad_to_pals()` function."
    - "Elements that have no `TrackingP` dictionary have `SciBmadStandard` as their tracking method with all parameters equal to false"
  extension_names:
    names:
      - SciBmad
    prefixes:
      - SciBmad_
  facility:
    - m:
        kind: Marker
    - beamline1:
        kind: Beamline
        line:
          - m
    - sc1:
        kind: RFCavity
        length: 2.0
        TrackingP:
          SciBmad:
            tracking_method: SaganCavity
            num_cells: 2
            L_active: -1
            radiation_damping_on: false
            radiation_fluctuations_on: false
        RFP:
          voltage: 2.0e9
          phase: 0.1
          frequency: 1.0e9
    - beamline2:
        kind: Beamline
        line:
          - sc1
    - sc2:
        kind: RFCavity
        length: 2.0
        TrackingP:
          SciBmad:
            tracking_method: SaganCavity
            num_cells: 3
            L_active: 0
            radiation_damping_on: false
            radiation_fluctuations_on: false
        RFP:
          voltage: 2.0e9
          zero_phase: BELOW_TRANSITION
          frequency: 1.0e9
    - beamline3:
        kind: Beamline
        line:
          - sc2
    - sc3:
        kind: RFCavity
        TrackingP:
          SciBmad:
            tracking_method: SaganCavity
            num_cells: 4
            L_active: 0
            radiation_damping_on: false
            radiation_fluctuations_on: false
        RFP:
          voltage: 2.0e9
          zero_phase: AFTER_TRANSITION
          frequency: 1.0e9
    - beamline4:
        kind: Beamline
        line:
          - sc3
    - lattice:
        kind: Lattice
        branches:
          - beamline1
          - beamline2
          - beamline3
          - beamline4
    - use: lattice
