PALS:
  version: null
  notes:
    - "This file was generated by the `scibmad_to_pals()` function."
  extension_names:
    names:
      - SciBmad
    prefixes:
      - SciBmad_
  facility:
    - drift_a:
        kind: Drift
        length: 0.25
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
            radiation_damping_on: false
            radiation_fluctuations_on: false
            ibs_damping_on: false
            ibs_fluctuations_on: false
    - quad_a:
        kind: Quadrupole
        length: 1.0
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
            radiation_damping_on: false
            radiation_fluctuations_on: false
            ibs_damping_on: false
            ibs_fluctuations_on: false
    - sbend_a:
        kind: SBend
        length: 2.0
        TrackingP:
          SciBmad:
            tracking_method: SciBmadStandard
            radiation_damping_on: false
            radiation_fluctuations_on: false
            ibs_damping_on: false
            ibs_fluctuations_on: false
    - beamline1:
        kind: Beamline
        line:
          - drift_a
          - quad_a
          - sbend_a
    - lattice:
        kind: Lattice
        branches:
          - beamline1
    - use: lattice
